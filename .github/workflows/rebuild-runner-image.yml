name: Rebuild Runner Image

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

env:
  DOCKER_IMAGE: shashwatjain/arc-runner

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check upstream runner version
        id: version
        run: |
          docker pull ghcr.io/actions/actions-runner:latest -q
          LATEST=$(docker run --rm ghcr.io/actions/actions-runner:latest \
            /home/runner/bin/Runner.Listener --version 2>&1 \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$')
          CURRENT=$(tr -d '[:space:]' < .runner-version)

          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          if [[ "$LATEST" != "$CURRENT" ]]; then
            echo "update=true" >> "$GITHUB_OUTPUT"
          else
            echo "update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip when already up to date
        if: steps.version.outputs.update == 'false' && github.event_name != 'workflow_dispatch'
        run: echo "Runner image is already on version ${{ steps.version.outputs.current }}."

      - name: Update pinned version
        if: steps.version.outputs.update == 'true'
        run: echo "${{ steps.version.outputs.latest }}" > .runner-version

      - name: Set up Docker Buildx
        if: steps.version.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.version.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push runner image
        if: steps.version.outputs.update == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          VERSION=$(tr -d '[:space:]' < .runner-version)
          docker build \
            --build-arg "RUNNER_VERSION=$VERSION" \
            -t "$DOCKER_IMAGE:$VERSION" \
            -t "$DOCKER_IMAGE:latest" \
            .
          docker push "$DOCKER_IMAGE:$VERSION"
          docker push "$DOCKER_IMAGE:latest"

      - name: Commit version bump
        if: steps.version.outputs.update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .runner-version
          git commit -m "chore: bump runner version to $(tr -d '[:space:]' < .runner-version)"
          git push
